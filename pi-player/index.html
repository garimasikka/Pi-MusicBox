<!DOCTYPE html>
<html>
<head>
    <title>Simple Audio Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: black;
            color: white;
        }
        button {
            padding: 20px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Audio Test Page</h1>
    <p>Click the buttons below to test different audio methods:</p>
    
    <button id="audioElementTest">Test Audio Element</button>
    <button id="webAudioTest">Test Web Audio API</button>
    <button id="beepTest">Test Simple Beep</button>
    
    <!-- Hidden audio element -->
    <audio id="testAudio" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    
    <div id="status">Status: Ready</div>
    
    <script>
        // Update status display
        function updateStatus(message) {
            document.getElementById('status').textContent = 'Status: ' + message;
            console.log(message);
        }
        
        // Test 1: HTML Audio Element
        document.getElementById('audioElementTest').addEventListener('click', function() {
            try {
                const audio = document.getElementById('testAudio');
                audio.volume = 1.0;
                
                // Play event handler
                audio.onplay = function() {
                    updateStatus('Audio element is playing');
                };
                
                // Error event handler
                audio.onerror = function(e) {
                    updateStatus('Audio element error: ' + e.message);
                };
                
                // Try to play
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(function() {
                        updateStatus('Audio element playing successfully');
                    }).catch(function(error) {
                        updateStatus('Audio element play failed: ' + error);
                    });
                }
            } catch (e) {
                updateStatus('Audio element exception: ' + e.message);
            }
        });
        
        // Test 2: Web Audio API
        document.getElementById('webAudioTest').addEventListener('click', function() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                updateStatus('Audio context created: ' + audioCtx.state);
                
                // Resume if needed
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(function() {
                        updateStatus('Audio context resumed');
                    });
                }
                
                // Create oscillator
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.value = 440; // A4 note
                
                // Create gain node (volume)
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.0; // Full volume
                
                // Connect nodes
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                // Play sound
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1); // Play for 1 second
                
                updateStatus('Web Audio test playing (1 second tone)');
            } catch (e) {
                updateStatus('Web Audio exception: ' + e.message);
            }
        });
