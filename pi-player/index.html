<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π MusicBox</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        #debug {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            max-width: 90%;
            z-index: 1000;
            font-family: monospace;
            border: 1px solid #555;
        }
        .test-sound {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>π MusicBox</h1>
        <div id="piDisplay"></div>
        <div class="controls">
            <button id="playPauseButton" class="icon-button">
                <span id="playPauseIcon">▶</span>
            </button>
        </div>
        
        <!-- Test Sound Button -->
        <button id="testSound" class="test-sound">Test Sound</button>
    </div>
    
    <!-- Debugging output -->
    <div id="debug">
        Debug Info:
    </div>
    
    <!-- Important: Load pi-digits.js first -->
    <script src="pi-digits.js"></script>
    <!-- Then load the main script -->
    <script src="script.js"></script>
    
    <!-- Add test sound functionality -->
    <script>
        document.getElementById('testSound').addEventListener('click', function() {
            debugLog("Test sound button pressed");
            
            try {
                // Create a temporary audio context just for this test
                const testContext = new (window.AudioContext || window.webkitAudioContext)();
                debugLog("Test context state: " + testContext.state);
                
                // Create oscillator
                const osc = testContext.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 440;
                osc.connect(testContext.destination);
                
                // Play a short beep
                osc.start();
                osc.stop(testContext.currentTime + 0.3);
                
                debugLog("Test sound played successfully");
            } catch (e) {
                debugLog("Test sound error: " + e.message);
            }
        });
    </script>
</body>
</html>
